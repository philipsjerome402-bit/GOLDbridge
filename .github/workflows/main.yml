name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Android APK
        uses: Gearix/web-to-apk@v1
        with:
          app-name: "GOLDbridge"
          url: "https://philipsjerome402-bit.github.io/GOLDbridge/"
          icon: "logo.png"
          
